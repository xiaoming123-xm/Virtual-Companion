providers:
  - provider_id: "openai"
    name: "OpenAI"
    description: "OpenAI 官方服务，支持 GPT-4o, o1, o3 等模型"
    lc_id: "openai"
    discovery: "openai"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true
        description: "API Key"
      - field_name: "base_url"
        field_type: "string"
        default_value: "https://api.openai.com/v1"
        description: "API 基础地址"

  - provider_id: "deepseek"
    name: "DeepSeek"
    description: "深度求索，支持原生 DeepSeek 驱动"
    lc_id: "deepseek"
    discovery: "openai"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true
      - field_name: "api_base"
        field_type: "string"
        default_value: "https://api.deepseek.com"

  - provider_id: "qwen"
    name: "Qwen"
    description: "阿里通义千问 (使用 ChatQwen 独立驱动)"
    lc_id: "qwen" # 在工厂中被特殊处理
    discovery: "openai"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true
      - field_name: "base_url"
        field_type: "string"
        default_value: "https://dashscope.aliyuncs.com/compatible-mode/v1"

  - provider_id: "siliconflow"
    name: "SiliconFlow"
    description: "硅基流动，高性价比大模型集成平台"
    lc_id: "openai"
    discovery: "openai"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true
      - field_name: "base_url"
        field_type: "string"
        default_value: "https://api.siliconflow.cn/v1"

  - provider_id: "openrouter"
    name: "OpenRouter"
    description: "OpenRouter 聚合网关"
    lc_id: "openai"
    discovery: "openai"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true
      - field_name: "base_url"
        field_type: "string"
        default_value: "https://openrouter.ai/api/v1"

  - provider_id: "anthropic"
    name: "Anthropic"
    description: "Claude 系列模型"
    lc_id: "anthropic"
    discovery: "none"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true

  - provider_id: "google"
    name: "Google Gemini"
    description: "Google AI Studio Gemini API"
    lc_id: "google_genai"
    discovery: "google"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true

  - provider_id: "ollama"
    name: "Ollama"
    description: "本地 Llama 运行环境"
    lc_id: "ollama"
    discovery: "ollama"
    config_fields:
      - field_name: "base_url"
        field_type: "string"
        default_value: "http://localhost:11434"

  - provider_id: "groq"
    name: "Groq"
    description: "极速推理引擎"
    lc_id: "groq"
    discovery: "openai"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true

  - provider_id: "mistralai"
    name: "Mistral AI"
    description: "Mistral 官方平台"
    lc_id: "mistralai"
    discovery: "none"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true

  - provider_id: "xai"
    name: "xAI (Grok)"
    description: "xAI (Grok) 官方服务"
    lc_id: "xai"
    discovery: "none"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true

  - provider_id: "perplexity"
    name: "Perplexity"
    description: "Perplexity 搜索模型"
    lc_id: "openai"
    discovery: "none"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true
      - field_name: "base_url"
        field_type: "string"
        default_value: "https://api.perplexity.ai"

  - provider_id: "together"
    name: "Together AI"
    description: "Together AI 推理平台"
    lc_id: "openai"
    discovery: "openai"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true
      - field_name: "base_url"
        field_type: "string"
        default_value: "https://api.together.xyz/v1"
