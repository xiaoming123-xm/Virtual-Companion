<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色卡片 - 硬朗风格修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
    </style>
</head>
<body class="bg-[#f0f0f0] min-h-screen p-10">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-black mb-10 text-black">
            <span class="bg-yellow-300 px-2 border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">角色</span> 
            管理
        </h1>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">

            <!-- ================= 卡片 1 ================= -->
            <div class="group relative bg-white border-2 border-black p-3 
                        transition-transform duration-200 hover:-translate-y-1 hover:-translate-x-1 
                        hover:shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] cursor-pointer">
                
                <!-- 1. 立绘区域 -->
                <div class="relative w-full aspect-[3/4] rounded-xl border-2 border-black overflow-hidden bg-gray-200">
                    <img src="https://images.unsplash.com/photo-1634926878768-2a5b3c426d0d?q=80&w=600&auto=format&fit=crop" 
                         class="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-300 group-hover:scale-105">
                    
                    <!-- [修改点] 删除按钮：硬朗风格 -->
                    <button class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center 
                                   bg-white border-2 border-black rounded-md 
                                   opacity-0 group-hover:opacity-100 transition-all duration-200
                                   hover:bg-red-500 hover:text-white hover:shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-0.5"
                            title="删除角色">
                        <i class="ph-bold ph-trash text-lg"></i>
                    </button>
                </div>

                <!-- 2. 信息区域 -->
                <div class="mt-4 flex justify-between items-end">
                    <div class="flex flex-col gap-2">
                        <!-- 名字 -->
                        <h3 class="text-2xl font-black text-black leading-none">Kiro</h3>
                        
                        <!-- 标签组 -->
                        <div class="flex flex-wrap gap-1.5">
                            </span>
                            <span class="px-1.5 py-0.5 text-xs font-bold border-2 border-black bg-white rounded text-gray-600">
                                GPT-4
                            </span>
                        </div>
                    </div>

                    <!-- [修改点] 进入/编辑按钮：作为视觉引导 -->
                    <div class="w-10 h-10 flex items-center justify-center 
                                bg-yellow-400 border-2 border-black rounded-lg
                                shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]
                                group-hover:bg-yellow-300 group-hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] 
                                transition-all">
                        <i class="ph-bold ph-arrow-right text-xl"></i>
                    </div>
                </div>
            </div>


            <!-- ================= 卡片 2 ================= -->
            <div class="group relative bg-white border-2 border-black p-3 
                        transition-transform duration-200 hover:-translate-y-1 hover:-translate-x-1 
                        hover:shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] cursor-pointer">
                
                <div class="relative w-full aspect-[3/4] rounded-xl border-2 border-black overflow-hidden bg-gray-200">
                    <img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=600&auto=format&fit=crop" 
                         class="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-300 group-hover:scale-105">
                    
                    <button class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center 
                                   bg-white border-2 border-black rounded-md 
                                   opacity-0 group-hover:opacity-100 transition-all duration-200
                                   hover:bg-red-500 hover:text-white hover:shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-0.5">
                        <i class="ph-bold ph-trash text-lg"></i>
                    </button>
                </div>

                <div class="mt-4 flex justify-between items-end">
                    <div class="flex flex-col gap-2">
                        <h3 class="text-2xl font-black text-black leading-none">赛博杀手</h3>
                        <div class="flex flex-wrap gap-1.5">
                            <span class="px-1.5 py-0.5 text-xs font-bold border-2 border-black bg-white rounded text-gray-600">
                                Gemini 3.0
                            </span>
                        </div>
                    </div>
                    <div class="w-10 h-10 flex items-center justify-center 
                                bg-yellow-400 border-2 border-black rounded-lg
                                shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]
                                group-hover:bg-yellow-300 group-hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] 
                                transition-all">
                        <i class="ph-bold ph-arrow-right text-xl"></i>
                    </div>
                </div>
            </div>

            <!-- ================= 卡片 3 (新建) ================= -->
            <div class="group relative bg-[#e5e5e5] border-2 border-black border-dashed p-3 
                        flex flex-col items-center justify-center text-center
                        transition-all duration-200 hover:-translate-y-1 hover:bg-white hover:border-solid
                        hover:shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] cursor-pointer min-h-[350px]">
                
                <div class="w-16 h-16 rounded-xl border-2 border-black bg-white flex items-center justify-center mb-4 
                            shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] group-hover:scale-110 transition-transform">
                    <i class="ph-bold ph-plus text-3xl"></i>
                </div>
                <h3 class="text-xl font-bold">新建角色</h3>
            </div>

        </div>
    </div>
</body>
</html>
